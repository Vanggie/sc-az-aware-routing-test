<!DOCTYPE html>
<html>
<head>
    <title>AZ-Aware Routing Test</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }
        .controls {
            margin-bottom: 30px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-right: 10px;
            cursor: pointer;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        #chart-container {
            height: 400px;
            margin-bottom: 10px;
        }
        .history-controls {
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 8px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #historySlider {
            flex: 1;
            height: 6px;
        }
        .history-info {
            min-width: 200px;
            font-size: 14px;
            color: #666;
        }
        #log {
            height: 200px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            background: #f9f9f9;
            font-family: monospace;
            font-size: 12px;
        }
        .match { color: green; }
        .no-match { color: red; }
    </style>
</head>
<body>
    <h1>AZ-Aware Routing Test</h1>
    
    <div class="controls">
        <button id="startBtn" onclick="startTest()">Start Test</button>
        <button id="stopBtn" onclick="stopTest()" disabled>Stop Test</button>
        <button onclick="resetTest()">Reset</button>
        <label for="tpsInput" style="margin-left: 20px;">RPS:</label>
        <input type="number" id="tpsInput" value="5" min="1" max="100" style="width: 60px; padding: 5px;">
        <span style="margin-left: 20px;">Custom Header:</span>
        <input type="text" id="headerName" placeholder="Header name" style="width: 140px; padding: 5px; margin-left: 5px;">
        <input type="text" id="headerValue" placeholder="Value" style="width: 140px; padding: 5px; margin-left: 5px;">
    </div>

    <div class="stats">
        <div class="stat-box">
            <div class="stat-value" id="totalRequests">0</div>
            <div class="stat-label">Total Requests</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="matchedRequests">0</div>
            <div class="stat-label">Same Zone</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="percentage">0%</div>
            <div class="stat-label">Same Zone %</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="requestsPerSec">0</div>
            <div class="stat-label">Requests/sec</div>
        </div>
    </div>

    <div id="chart-container">
        <canvas id="chart"></canvas>
    </div>

    <div id="latency-chart-container" style="height: 400px; margin-bottom: 10px; margin-top: 30px;">
        <canvas id="latencyChart"></canvas>
    </div>

    <div class="history-controls">
        <div class="slider-container">
            <span>History:</span>
            <input type="range" id="historySlider" min="0" max="0" value="0" disabled>
            <span class="history-info" id="historyInfo">No history</span>
        </div>
    </div>

    <h3>Request Log</h3>
    <div id="log"></div>

    <script>
        let totalRequests = 0;
        let matchedRequests = 0;
        let isRunning = false;
        let intervalId = null;
        let startTime = null;
        let chart = null;
        let latencyChart = null;
        let historySnapshots = [];
        let currentHistoryIndex = -1;
        
        // Bin tracking
        let binStartTime = null;
        let binTotalRequests = 0;
        let binMatchedRequests = 0;
        let binLatencies = [];
        const BIN_DURATION_MS = 10000; // 10 seconds
        
        // Snapshot tracking
        let lastSnapshotTime = null;
        const SNAPSHOT_INTERVAL_MS = 600000; // 10 minutes
        
        // RPS tracking
        let sessionStartTime = null;
        let sessionTotalRequests = 0;

        // Initialize chart
        const ctx = document.getElementById('chart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Same Zone Traffic %',
                    data: [],
                    borderColor: 'rgb(75, 192, 192)',
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        title: {
                            display: true,
                            text: 'Same Zone Traffic Percentage (%)'
                        }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'Time'
                        }
                    }
                }
            }
        });

        // Initialize latency chart
        const latencyCtx = document.getElementById('latencyChart').getContext('2d');
        latencyChart = new Chart(latencyCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Average E2E Latency (ms)',
                    data: [],
                    borderColor: 'rgb(255, 99, 132)',
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Latency (ms)'
                        }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'Time'
                        }
                    }
                }
            }
        });

        async function makeRequest() {
            try {
                const headers = {
                    'azAwareRouting': 'true',
                    'dataSize': '1000'
                };
                const customName = document.getElementById('headerName').value.trim();
                const customValue = document.getElementById('headerValue').value.trim();
                if (customName) {
                    headers['X-Custom-Header-Name'] = customName;
                    headers['X-Custom-Header-Value'] = customValue;
                }
                const response = await fetch('/api/', { headers });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                const azId = data.availabilityZoneId;
                const upstreamAzId = data.upstreamAvailabilityZoneId;
                const isMatch = azId === upstreamAzId;
                const serverLatency = parseInt(response.headers.get('X-Server-Latency')) || 0;

                totalRequests++;
                binTotalRequests++;
                sessionTotalRequests++;
                if (isMatch) {
                    matchedRequests++;
                    binMatchedRequests++;
                }
                if (serverLatency > 0) {
                    binLatencies.push(serverLatency);
                }

                updateStats();
                checkBinCompletion();
                logRequest(totalRequests, azId, upstreamAzId, isMatch);

            } catch (error) {
                console.error('Request failed:', error);
                const errorDetails = `${error.name}: ${error.message} | URL: /api/ | Time: ${new Date().toISOString()}`;
                logError(errorDetails);
                
                if (error.message.includes('fetch')) {
                    logError('Possible CORS issue - check browser console for details');
                }
            }
        }

        function checkBinCompletion() {
            if (!binStartTime) {
                binStartTime = Date.now();
                return;
            }
            
            const elapsed = Date.now() - binStartTime;
            if (elapsed >= BIN_DURATION_MS) {
                completeBin();
                binStartTime = Date.now();
                binTotalRequests = 0;
                binMatchedRequests = 0;
                binLatencies = [];
            }
        }

        function completeBin() {
            const percentage = binTotalRequests > 0 ? ((binMatchedRequests / binTotalRequests) * 100).toFixed(2) : 0;
            const binTime = new Date(binStartTime).toLocaleTimeString();
            
            chart.data.labels.push(binTime);
            chart.data.datasets[0].data.push(percentage);

            // Keep only last 50 bins
            if (chart.data.labels.length > 50) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }

            chart.update('none');
            
            // Calculate average latency for this bin
            const avgLatency = binLatencies.length > 0 
                ? (binLatencies.reduce((a, b) => a + b, 0) / binLatencies.length).toFixed(2)
                : 0;
            
            latencyChart.data.labels.push(binTime);
            latencyChart.data.datasets[0].data.push(avgLatency);

            // Keep only last 50 bins
            if (latencyChart.data.labels.length > 50) {
                latencyChart.data.labels.shift();
                latencyChart.data.datasets[0].data.shift();
            }

            latencyChart.update('none');
            
            // Check if 10 minutes have passed since last snapshot
            const now = Date.now();
            if (!lastSnapshotTime || (now - lastSnapshotTime) >= SNAPSHOT_INTERVAL_MS) {
                saveSnapshot();
                lastSnapshotTime = now;
            }
        }

        function updateStats() {
            document.getElementById('totalRequests').textContent = totalRequests;
            document.getElementById('matchedRequests').textContent = matchedRequests;
            
            const percentage = totalRequests > 0 ? ((matchedRequests / totalRequests) * 100).toFixed(2) : 0;
            document.getElementById('percentage').textContent = percentage + '%';

            if (sessionStartTime && isRunning) {
                const elapsed = (Date.now() - sessionStartTime) / 1000;
                const rps = (sessionTotalRequests / elapsed).toFixed(2);
                document.getElementById('requestsPerSec').textContent = rps;
            }
        }

        function saveSnapshot() {
            historySnapshots.push({
                timestamp: new Date().toISOString(),
                totalRequests: totalRequests,
                matchedRequests: matchedRequests,
                labels: [...chart.data.labels],
                data: [...chart.data.datasets[0].data]
            });
            
            currentHistoryIndex = historySnapshots.length - 1;
            updateHistorySlider();
        }

        function updateHistorySlider() {
            const slider = document.getElementById('historySlider');
            const info = document.getElementById('historyInfo');
            
            if (historySnapshots.length > 0) {
                slider.max = historySnapshots.length - 1;
                slider.value = currentHistoryIndex;
                slider.disabled = false;
                
                const snapshot = historySnapshots[currentHistoryIndex];
                const time = new Date(snapshot.timestamp).toLocaleTimeString();
                info.textContent = `Snapshot ${currentHistoryIndex + 1}/${historySnapshots.length} - ${time} (${snapshot.totalRequests} requests)`;
            } else {
                slider.disabled = true;
                info.textContent = 'No history';
            }
        }

        document.getElementById('historySlider').addEventListener('input', function(e) {
            currentHistoryIndex = parseInt(e.target.value);
            const snapshot = historySnapshots[currentHistoryIndex];
            
            chart.data.labels = [...snapshot.labels];
            chart.data.datasets[0].data = [...snapshot.data];
            chart.update();
            
            const time = new Date(snapshot.timestamp).toLocaleTimeString();
            document.getElementById('historyInfo').textContent = 
                `Snapshot ${currentHistoryIndex + 1}/${historySnapshots.length} - ${time} (${snapshot.totalRequests} requests)`;
        });

        function logRequest(num, azId, upstreamAzId, isMatch) {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = isMatch ? 'match' : 'no-match';
            entry.textContent = `Request ${num}: AZ=${azId}, Upstream=${upstreamAzId} - ${isMatch ? 'MATCH' : 'NO MATCH'}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function logError(message) {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.style.color = 'orange';
            entry.textContent = `ERROR: ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function startTest() {
            if (isRunning) return;
            
            isRunning = true;
            startTime = Date.now();
            binStartTime = Date.now();
            lastSnapshotTime = Date.now();
            sessionStartTime = Date.now();
            sessionTotalRequests = 0;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('tpsInput').disabled = true;
            document.getElementById('headerName').disabled = true;
            document.getElementById('headerValue').disabled = true;

            // Get TPS from input
            const tps = parseInt(document.getElementById('tpsInput').value) || 5;
            const intervalMs = 1000 / tps;

            // Make requests continuously
            const makeRequestLoop = () => {
                if (isRunning) {
                    makeRequest();
                }
            };
            
            intervalId = setInterval(makeRequestLoop, intervalMs);
        }

        function stopTest() {
            if (!isRunning) return;
            
            isRunning = false;
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
            
            // Complete the current bin if it has data
            if (binTotalRequests > 0) {
                completeBin();
            }
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('tpsInput').disabled = false;
            document.getElementById('headerName').disabled = false;
            document.getElementById('headerValue').disabled = false;
            
            console.log('Test stopped');
        }

        function resetTest() {
            stopTest();
            totalRequests = 0;
            matchedRequests = 0;
            startTime = null;
            binStartTime = null;
            binTotalRequests = 0;
            binMatchedRequests = 0;
            binLatencies = [];
            lastSnapshotTime = null;
            sessionStartTime = null;
            sessionTotalRequests = 0;
            historySnapshots = [];
            currentHistoryIndex = -1;
            
            chart.data.labels = [];
            chart.data.datasets[0].data = [];
            chart.update();
            
            latencyChart.data.labels = [];
            latencyChart.data.datasets[0].data = [];
            latencyChart.update();
            
            document.getElementById('log').innerHTML = '';
            document.getElementById('requestsPerSec').textContent = '0';
            updateStats();
            updateHistorySlider();
        }
    </script>
</body>
</html>
